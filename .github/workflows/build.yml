name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    name: Windows x64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset windows-x64

      - name: Build
        run: cmake --build build_x64 --config RelWithDebInfo --parallel

      - name: Stage package
        shell: pwsh
        run: |
          $version = (Get-Content buildspec.json | ConvertFrom-Json).version
          $stage = "package/retroize"
          New-Item -ItemType Directory -Force -Path "$stage/bin/64bit" | Out-Null
          New-Item -ItemType Directory -Force -Path "$stage/data" | Out-Null
          Copy-Item "build_x64/RelWithDebInfo/retroize.dll" "$stage/bin/64bit/" -Force
          Copy-Item "build_x64/RelWithDebInfo/retroize.pdb" "$stage/bin/64bit/" -Force -ErrorAction SilentlyContinue
          Copy-Item -Recurse "build_x64/rundir/RelWithDebInfo/retroize/*" "$stage/data/" -Force
          Compress-Archive -Path "$stage" -DestinationPath "retroize-$version-windows-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: retroize-windows-x64
          path: retroize-*-windows-x64.zip
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: retroize-*-windows-x64.zip
          draft: true
